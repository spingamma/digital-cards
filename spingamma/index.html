<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Tarjeta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgFondo: '#1D253A',
                        bgTarjeta: '#232D47',
                        bgBoton: '#2A3553',
                        bgIcono: '#374465',
                        textoClaro: '#FFFFFF',
                        textoGris: '#9CA3AF',
                        oroAcento: '#F3DCA0',
                        checkBg: '#374465'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #1D253A; 
        }

        /* Pantalla de Carga (Throbber) */
        #loader {
            position: fixed;
            inset: 0;
            background: #1D253A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }
        
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(243, 220, 160, 0.15);
            border-top: 4px solid #F3DCA0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* Ocultar tarjeta al inicio */
        #main-card { 
            opacity: 0; 
            transition: opacity 0.8s ease, transform 0.8s ease; 
            transform: translateY(10px); 
        }
        #main-card.loaded { 
            opacity: 1; 
            transform: translateY(0); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-[100dvh] flex items-center justify-center p-3 sm:p-4 relative overflow-hidden text-textoClaro">

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-oroAcento text-[0.65rem] tracking-[0.3em] uppercase font-medium">Sincronizando Perfil...</p>
    </div>

    <div id="main-card" class="relative z-10 w-full max-w-sm h-full max-h-[850px] bg-bgTarjeta border border-white/5 shadow-2xl rounded-[2.5rem] p-6 sm:p-8 flex flex-col items-center overflow-y-auto no-scrollbar">
        
        <div class="absolute top-6 right-6 flex gap-3 z-20">
            <button id="btn-qr" onclick="toggleQR()" class="w-10 h-10 flex items-center justify-center bg-transparent border border-white/10 hover:bg-white/5 rounded-full transition-all text-textoGris hover:text-textoClaro" title="Ver Código QR">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>

            <a id="link-facebook" href="#" target="_blank" class="group flex items-center p-3 rounded-[1.25rem] bg-bgBoton hover:bg-bgIcono transition-all w-full">

                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>

            <a id="link-website" href="#" target="_blank" class="group flex items-center p-3 rounded-[1.25rem] bg-bgBoton hover:bg-bgIcono transition-all w-full">
                <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl bg-bgIcono group-hover:bg-bgBoton text-textoGris group-hover:text-oroAcento transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>

        <p class="text-[0.60rem] tracking-[0.2em] uppercase text-textoGris/50 mt-10 pb-2 text-center w-full">

        </p>

    <div id="modal-qr" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-bgFondo/90 backdrop-blur-sm" onclick="toggleQR()"></div>
        <div class="relative bg-bgTarjeta border border-white/10 p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center max-w-[300px]">
            <button onclick="toggleQR()" class="absolute top-4 right-4 text-textoGris hover:text-textoClaro">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <p class="text-oroAcento text-xs uppercase tracking-[0.2em] mb-6 font-semibold">Código QR</p>
            <div class="bg-white p-3 rounded-2xl shadow-inner">
                <img id="img-qr-dinamico" src="" alt="Generando QR..." class="w-44 h-44">
            </div>
            <p class="text-textoGris text-[0.7rem] mt-6 text-center leading-relaxed">Escanea para visitar el perfil profesional</p>
        </div>
    </div>

    <script>
        const CLIENTE_ID = "spingamma";

        // LÓGICA EXACTA DEL RAG - SIN MODIFICACIONES ADICIONALES
        const imgPerfil = document.getElementById('profile-img');
        let loaderRemovido = false;

        function ocultarLoader() {
            if (loaderRemovido) return;
            loaderRemovido = true;
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-card').classList.add('loaded');
            }, 600);
        }

        // El loader desaparecerá SOLO cuando la imagen termine de descargarse
        imgPerfil.addEventListener('load', ocultarLoader);

        // Respaldo de seguridad por si falla la conexión (quita el loader a los 6 segundos)
        setTimeout(ocultarLoader, 6000);


        // Generación dinámica del código QR
        function toggleQR() {
            const modal = document.getElementById('modal-qr');
            modal.classList.toggle('hidden');
            const imgQr = document.getElementById('img-qr-dinamico');
            
            if(!modal.classList.contains('hidden')) {
                const urlActual = encodeURIComponent(window.location.href);
                imgQr.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${urlActual}&color=1D253A&bgcolor=FFFFFF`;
            }
        }
    </script>
    <script src="../conexion.js"></script>
